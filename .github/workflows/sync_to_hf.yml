name: Sync to Hugging Face Space

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
          
      - name: Install Hugging Face CLI
        run: pip install huggingface_hub

      - name: Upload to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          huggingface-cli login --token $HF_TOKEN
          # Upload only backend files to avoid binary/image errors and save space
          huggingface-cli upload SRG4545/crop-recommendation-api . . --repo-type space --exclude "frontend/*" "static/*" "dataset/*" "templates/*" ".github/*" ".claude/*"
