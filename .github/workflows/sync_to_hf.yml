name: Sync to Hugging Face Space

on:
  push:
    branches: [ "main" ]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
          
      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # IMPORTANT: Replace YOUR_USERNAME and YOUR_SPACE_NAME with your actual Hugging Face details
          # Example: git push https://SRG2004:$HF_TOKEN@huggingface.co/spaces/SRG2004/crop-api main
          git push https://YOUR_USERNAME:$HF_TOKEN@huggingface.co/spaces/YOUR_USERNAME/YOUR_SPACE_NAME main
